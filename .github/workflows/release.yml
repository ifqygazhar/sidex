name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.3)'
        required: true
        default: '0.1.3'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
            artifact_name: macos-arm64

          - platform: macos-latest
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            artifact_name: macos-universal

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install frontend dependencies
        run: bun install

      - name: Install create-dmg
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg
          sudo ln -sf "$(which create-dmg)" /usr/local/bin/create-dmg

      - name: Setup built-in extensions
        shell: bash
        run: bash scripts/setup-extensions.sh

      - name: Build frontend
        env:
          NODE_OPTIONS: '--max-old-space-size=12288'
        run: |
          bun run setup
          bunx vite build
          bun run postbuild

      - name: Build Tauri app
        timeout-minutes: 40
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bunx tauri build --target ${{ matrix.target }} --config src-tauri/tauri.release.conf.json

      - name: Collect macOS artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist-artifacts
          find target \( \
            -name "*.dmg" \
            -o -name "*.app.tar.gz" \
            -o -name "*.app.tar.gz.sig" \
          \) -print0 | while IFS= read -r -d '' file; do
            cp "$file" "dist-artifacts/${{ matrix.artifact_name }}-$(basename "$file")"
          done
          ls -la dist-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-artifacts/
          retention-days: 7

  # ── Deploy to Cloudflare R2 ──────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: List files
        run: find all-artifacts -type f | sort

      - name: Configure AWS CLI for R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          aws configure set aws_access_key_id "$R2_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$R2_SECRET_ACCESS_KEY"
          aws configure set default.region auto

      - name: Upload to R2 — versioned folder
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          aws s3 sync all-artifacts/ \
            "s3://siden-assets/releases/sidex/${VERSION}/" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --delete

      - name: Upload to R2 — overwrite latest
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          aws s3 sync all-artifacts/ \
            "s3://siden-assets/releases/sidex/latest/" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --delete

      - name: Generate and upload latest.json
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://cdn.siden.ai/releases/sidex/latest"

          MACOS_ARM_PATH=$(find all-artifacts -maxdepth 1 -type f -name "macos-arm64-*.app.tar.gz" | sort | head -1)
          MACOS_ARM_SIG_PATH=$(find all-artifacts -maxdepth 1 -type f -name "macos-arm64-*.app.tar.gz.sig" | sort | head -1)
          MACOS_UNIVERSAL_PATH=$(find all-artifacts -maxdepth 1 -type f -name "macos-universal-*.app.tar.gz" | sort | head -1)
          MACOS_UNIVERSAL_SIG_PATH=$(find all-artifacts -maxdepth 1 -type f -name "macos-universal-*.app.tar.gz.sig" | sort | head -1)

          MACOS_ARM_FILE=$([ -n "$MACOS_ARM_PATH" ] && basename "$MACOS_ARM_PATH" || echo "")
          MACOS_ARM_SIG=$([ -n "$MACOS_ARM_SIG_PATH" ] && cat "$MACOS_ARM_SIG_PATH" || echo "")
          MACOS_UNIVERSAL_FILE=$([ -n "$MACOS_UNIVERSAL_PATH" ] && basename "$MACOS_UNIVERSAL_PATH" || echo "")
          MACOS_UNIVERSAL_SIG=$([ -n "$MACOS_UNIVERSAL_SIG_PATH" ] && cat "$MACOS_UNIVERSAL_SIG_PATH" || echo "")

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See the full changelog at https://github.com/${{ github.repository }}/releases/tag/v${VERSION}",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": { "signature": "${MACOS_ARM_SIG}", "url": "${BASE_URL}/${MACOS_ARM_FILE}" },
              "darwin-x86_64": { "signature": "${MACOS_UNIVERSAL_SIG}", "url": "${BASE_URL}/${MACOS_UNIVERSAL_FILE}" }
            }
          }
          EOF

          aws s3 cp latest.json \
            "s3://siden-assets/releases/sidex/latest/latest.json" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --content-type "application/json" \
            --cache-control "no-cache"

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 'v${{ github.event.inputs.version || github.ref_name }}'
          name: 'SideX v${{ github.event.inputs.version || github.ref_name }}'
          draft: true
          generate_release_notes: true
          files: all-artifacts/**
