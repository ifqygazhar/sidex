name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.3 or v0.1.3)'
        required: true
        default: '0.1.3'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_version: ${{ steps.version.outputs.release_version }}
    steps:
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi

          VERSION="${VERSION#refs/tags/}"
          VERSION="${VERSION#v}"
          RELEASE_TAG="v${VERSION}"

          echo "release_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: SideX ${{ steps.version.outputs.release_tag }}
          generate_release_notes: true
          make_latest: true

  build:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
            artifact_name: macos-arm64

          - platform: macos-latest
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            artifact_name: macos-universal

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install frontend dependencies
        run: bun install

      - name: Install create-dmg
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg
          sudo ln -sf "$(which create-dmg)" /usr/local/bin/create-dmg

      - name: Bundle Node runtime
        shell: bash
        run: bash scripts/bundle-node-runtime.sh ${{ matrix.target }}

      - name: Setup built-in extensions
        shell: bash
        run: bash scripts/setup-extensions.sh

      - name: Build frontend
        env:
          NODE_OPTIONS: '--max-old-space-size=12288'
        run: |
          bun run setup
          bunx vite build
          bun run postbuild

      - name: Build Tauri app
        timeout-minutes: 40
        run: bunx tauri build --target ${{ matrix.target }} --config src-tauri/tauri.release.conf.json

      - name: Collect macOS artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist-artifacts
          find target \( \
            -name "*.dmg" \
          \) -print0 | while IFS= read -r -d '' file; do
            cp "$file" "dist-artifacts/${{ matrix.artifact_name }}-$(basename "$file")"
          done
          ls -la dist-artifacts/

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          files: dist-artifacts/*.dmg
          fail_on_unmatched_files: true
          overwrite_files: true
