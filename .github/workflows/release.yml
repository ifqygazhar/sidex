name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.3 or v0.1.3)'
        required: true
        default: '0.1.3'

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_version: ${{ steps.version.outputs.release_version }}
    steps:
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi

          VERSION="${VERSION#refs/tags/}"
          VERSION="${VERSION#v}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release version must be SemVer, for example 0.1.3 or v0.1.3"
            exit 1
          fi

          RELEASE_TAG="v${VERSION}"

          echo "release_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: SideX ${{ steps.version.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          draft: true
          make_latest: false

  build:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
            artifact_name: macos-arm64

          - platform: macos-latest
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            artifact_name: macos-universal

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Apply release version
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.release_version }}
        run: bun scripts/apply-release-version.js "$RELEASE_VERSION"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install frontend dependencies
        run: bun install

      - name: Install create-dmg
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg
          sudo ln -sf "$(which create-dmg)" /usr/local/bin/create-dmg

      - name: Bundle Node runtime
        shell: bash
        run: |
          bash scripts/bundle-node-runtime.sh ${{ matrix.target }}

          if find src-tauri/node -type l -print -quit | grep -q .; then
            echo "::error::Bundled Node runtime contains symlinks. Only bin/node should be bundled."
            find src-tauri/node -type l -print
            exit 1
          fi

          if find src-tauri/node -path '*/bin/corepack' -o -path '*/bin/npm' -o -path '*/bin/npx' | grep -q .; then
            echo "::error::Bundled Node runtime contains npm/corepack helper links. Only bin/node should be bundled."
            find src-tauri/node -path '*/bin/corepack' -o -path '*/bin/npm' -o -path '*/bin/npx'
            exit 1
          fi

      - name: Setup built-in extensions
        shell: bash
        run: bash scripts/setup-extensions.sh

      - name: Build frontend
        env:
          NODE_OPTIONS: '--max-old-space-size=12288'
        run: |
          bun run setup
          bunx vite build
          bun run postbuild

      - name: Build Tauri app
        timeout-minutes: 40
        run: bunx tauri build --target ${{ matrix.target }} --config src-tauri/tauri.release.conf.json

      - name: Validate macOS DMG contents
        if: runner.os == 'macOS'
        shell: bash
        run: |
          dmg_path="$(find target -path "*/bundle/dmg/*.dmg" -type f -print -quit)"
          if [ -z "$dmg_path" ]; then
            echo "::error::DMG was not created"
            find target -maxdepth 8 -type f -name "*.dmg" -print
            exit 1
          fi

          echo "Validating $dmg_path"

          mount_dir="$(mktemp -d)"
          cleanup() {
            hdiutil detach "$mount_dir" -quiet || true
            rmdir "$mount_dir" || true
          }
          trap cleanup EXIT

          hdiutil attach "$dmg_path" -readonly -nobrowse -mountpoint "$mount_dir" -quiet

          app_path="$(find "$mount_dir" -maxdepth 2 -name "SideX.app" -type d -print -quit)"
          if [ -z "$app_path" ]; then
            echo "::error::SideX.app was not found inside DMG"
            find "$mount_dir" -maxdepth 3 -print
            exit 1
          fi

          test -f "$app_path/Contents/Resources/extension-host/server.cjs"
          test -f "$app_path/Contents/Resources/extension-host/host.cjs"

          case "${{ matrix.target }}" in
            aarch64-apple-darwin)
              test -x "$app_path/Contents/Resources/node/darwin-arm64/bin/node"
              ;;
            universal-apple-darwin)
              test -x "$app_path/Contents/Resources/node/darwin-arm64/bin/node"
              test -x "$app_path/Contents/Resources/node/darwin-x64/bin/node"
              ;;
          esac

      - name: Collect macOS artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist-artifacts
          find target \( \
            -name "*.dmg" \
          \) -print0 | while IFS= read -r -d '' file; do
            cp "$file" "dist-artifacts/${{ matrix.artifact_name }}-$(basename "$file")"
          done
          ls -la dist-artifacts/

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          files: dist-artifacts/*.dmg
          fail_on_unmatched_files: true
          overwrite_files: true

  publish-release:
    needs:
      - prepare-release
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          gh release edit "$RELEASE_TAG" --draft=false --latest
